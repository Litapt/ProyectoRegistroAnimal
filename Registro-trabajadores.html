<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro trabajadores</title>
    <link rel="stylesheet" href="R_trabajadores.css">
</head>
<body>
<header class="main-header">
    <div class="header-logos Izq">
        <img src="ecologia.png" alt="Logo de ecología" class="logo-img">
        <img src="gobierno.png" alt="Logo del gobierno" class="logo-img">
    </div>

    <div class="title-container">
        <h1>Mi mascota Comondú</h1>
        <p>Registro animal del municipio de comondú</p>
    </div>

    <div class="header-logos Der">
    <img src="Imagen.png" alt="Marca de agua" class="logo-img">
    </div>
</header>
    <main class="main-card">
        <h1>REGISTRO TRABAJADORES</h1>
        <p>Completa los datos</p>
        <form action="#" method="post">
        <label for="nombre">Nombre *</label>
        <input type="text" id="nombre" name="nombre" placeholder="Aqui va tu nombre. Ej Alan"
        required>
        <label for="apellidoP">apellido Paterno *</label>
        <input type="text" id="apellidoP" name="apellidoP" placeholder="Aqui va tu apellido paterno"
        required>
        <label for="apellidoM">apellido Materno *</label>
        <input type="text" id="apellidoM" name="apellidoM" placeholder="Aqui va tu apellido materno"
        required>
        <label for="CURP">CURP *</label>
        <input type="text" id="CURP" name="CURP" placeholder="18 caracteres" minlength="18" maxlength="18" required>

        <label for="correo">Correo *</label>
        <input type="email" id="correo" name="correo" placeholder="ejemplo@ejemplo.com" required>

        <button class="btn" type="submit">Enviar</button>
        </form>
    </main>

</body>
</html>
