<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi mascota Comondú - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <header class="main-header">
        <div class="title-container">
            <h1>Mi mascota Comondú</h1>
            <p>Registro animal del municipio de comondú</p>
        </div>
        <div class="header-logos">
<!--            <img src="Imagen.png" style="width: 3%;">-->
            <div class="logo-circle">Marca de agua</div>
            <div class="logo-circle">Logo de ecología</div>
            <div class="logo-circle">Logo del gobierno</div>
        </div>
    </header>
    <main class="content">
        <img src="Huella.Png" alt="animal" class="deco-left">
        <div class="login-card">
            <h2>Inicio de sesion</h2>
            <form action="index.html" method="post">
            <div class="input-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" maxlength="30" required>
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" minlength="8" required>
            </div>
            <a href="#" class="forgot">Olvide mi contraseña</a>
            <button class="btn-submit" type="submit">
                Iniciar sesión
            </button>
        </form>
        </div>
        <img src="Huella2.png" alt="huella" class="deco-right">
    </main>
</body>
</html>
